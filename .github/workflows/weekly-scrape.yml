# Weekly incremental scrape — routine 10-day delta refresh for Content Radar.
# Cheap enough to run every week inside the Apify Starter prepaid (see
# instagram-pipeline/APIFY-COST.md). Thin caller: the real steps live in
# scrape-pipeline.yml. Manual trigger available via the Actions tab.
name: weekly-scrape

on:
  schedule:
    - cron: '0 5 * * 1' # Mondays 05:00 UTC
  workflow_dispatch:

jobs:
  call:
    uses: ./.github/workflows/scrape-pipeline.yml
    with:
      window_days: '10'
    secrets: inherit
