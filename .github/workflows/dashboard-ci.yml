name: Dashboard CI

on:
  push:
    paths:
      - 'dashboard/**'
      - '.github/workflows/dashboard-ci.yml'
  pull_request:
    paths:
      - 'dashboard/**'

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test
      # `next build` is excluded: the page prerenders from Supabase at build
      # time, so it needs SUPABASE_URL/SUPABASE_ANON_KEY repo secrets. Add them
      # and a build step if build-level regressions become a concern.
